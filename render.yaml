# render.yaml — Render Blueprint for BPSC Saathi Backend
# https://render.com/docs/blueprint-spec
#
# Usage: Connect your GitHub repo to Render, and it will auto-detect this file.
# Or manually create a Web Service pointing to the backend/ directory.

services:
  - type: web
    name: bpsc-saathi-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore  # Closest to India for low latency
    healthCheckPath: /ping
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard (from Neon)
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set to your Vercel frontend URL after deployment
